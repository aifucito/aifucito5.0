<!DOCTYPE html>
<html>
<head>
    <title>RADAR TÁCTICO AIFU - CONO SUR</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; font-family: 'Courier New', Courier, monospace; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* PANEL DE ESTADÍSTICAS - AHORA SIEMPRE AL FRENTE */
        .radar-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            background: rgba(0, 20, 10, 0.85); /* Fondo oscuro traslúcido tipo militar */
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 15px;
            color: #00ff88;
            z-index: 9999; /* Valor altísimo para que nada lo tape */
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            pointer-events: none; /* Para que puedas mover el mapa por debajo si quieres */
        }

        .radar-panel h2 { margin: 0 0 10px 0; font-size: 18px; text-transform: uppercase; border-bottom: 1px solid #00ff88; }
        .stat { margin: 5px 0; font-size: 14px; }
        .intensidad-bar {
            height: 10px;
            background: linear-gradient(to right, blue, cyan, lime, green);
            margin-top: 10px;
            border-radius: 5px;
        }

        /* EFECTO DE PULSO PARA LOS OVNIS */
        .ufo-icon {
            background: rgba(0, 255, 136, 0.3);
            border-radius: 50%;
            border: 2px solid #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }
    </style>
</head>
<body>

    <div class="radar-panel">
        <h2>🛰️ RADAR TÁCTICO AIFU</h2>
        <div class="stat">REPORTES HOY: <span id="count">30</span></div>
        <div class="stat">ESTADO: <span style="color: #00ff88; font-weight: bold;">ACTIVO - ALTA DENSIDAD</span></div>
        <div class="stat">INTENSIDAD</div>
        <div class="intensidad-bar"></div>
        <div style="display: flex; justify-content: space-between; font-size: 10px; margin-top: 5px;">
            <span>Bajo</span>
            <span>Alta</span>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // INICIALIZAR MAPA
        // Usamos un estilo "Light" o "Terrain" para que no sea negro
        var map = L.map('map').setView([-34.6037, -58.3816], 5); // Centrado en BsAs/Uruguay

        // ESTILO DEL MAPA (Aquí cambiamos el color a uno claro como el de tu foto)
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: 'AIFU TACTICAL'
        }).addTo(map);

        // FUNCIÓN PARA AGREGAR LOS PUNTOS (Simulada para el ejemplo)
        function agregarPunto(lat, lon, esVip) {
            var color = esVip ? '#00ff88' : '#00ffff';
            var pulseMarker = L.circleMarker([lat, lon], {
                radius: 15,
                color: color,
                fillColor: color,
                fillOpacity: 0.5,
                className: 'ufo-icon' // Aplica el brillo del CSS
            }).addTo(map);
        }

        // Cargar datos del servidor
        fetch('/radar-data')
            .then(res => res.json())
            .then(data => {
                document.getElementById('count').innerText = data.length;
                data.forEach(p => {
                    agregarPunto(p.lat, p.lon, p.vip);
                });
            });
    </script>
</body>
</html>
