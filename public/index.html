<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🛸 AIFU RADAR</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#map {
  position: absolute;
  width: 100%;
  height: 100%;
}

#panel {
  position: absolute;
  top: 15px;
  left: 15px;
  z-index: 999;
  background: rgba(0,0,0,0.7);
  border: 1px solid #00ff88;
  padding: 10px;
  color: #00ff88;
  font-size: 13px;
  backdrop-filter: blur(6px);
}

.popup-header { font-weight: bold; color: #00ff88; }
.popup-loc { font-size: 12px; opacity: 0.8; }
.popup-desc { margin-top: 5px; }
.popup-footer { margin-top: 5px; font-size: 10px; opacity: 0.6; }

.ufo-icon-container { position: relative; }

.ufo-pulse {
  position: absolute;
  width: 30px;
  height: 30px;
  border: 2px solid #00ff88;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform: scale(0.5); opacity: 1; }
  100% { transform: scale(2); opacity: 0; }
}

.ufo-svg {
  width: 32px;
  height: 32px;
  filter: drop-shadow(0 0 5px #00ff88);
}

#range {
  margin-top: 5px;
  background: black;
  color: #00ff88;
  border: 1px solid #00ff88;
}

#push {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #00ff88;
  color: black;
  padding: 10px;
  display: none;
  z-index: 999;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <div>📡 Reportes: <span id="count">0</span></div>
  <div>🛰️ Densidad: <span id="densidad">BAJA</span></div>

  <select id="range">
    <option value="24h">24h</option>
    <option value="7d">7 días</option>
    <option value="1m">1 mes</option>
  </select>
</div>

<div id="push">🚨 Nuevo avistamiento detectado</div>

<script>
// ===============================
// 🛰 RADAR CORE (TU CÓDIGO ORIGINAL)
// ===============================

const map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([-34.6, -58.4], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 18
}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);
let lastDataHash = "";

// ICONO
const ufoIcon = L.divIcon({
  className: 'ufo-icon-container',
  html: `
    <div class="ufo-pulse"></div>
    <svg class="ufo-svg" viewBox="0 0 100 100">
      <ellipse cx="50" cy="55" rx="45" ry="15" fill="none" stroke="#00ff88" stroke-width="2"/>
      <path d="M 25 50 C 25 25, 75 25, 75 50" fill="none" stroke="#00ff88" stroke-width="2"/>
      <circle cx="30" cy="62" r="2" fill="#00ff88"/>
      <circle cx="50" cy="65" r="2" fill="#00ff88"/>
      <circle cx="70" cy="62" r="2" fill="#00ff88"/>
    </svg>
  `,
  iconSize: [32, 32],
  iconAnchor: [16, 16]
});

// ALERTA
function triggerPush() {
  const el = document.getElementById("push");
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 4000);
}

// LOAD
async function loadData() {
  const range = document.getElementById("range").value;

  try {
    const res = await fetch(`/api/reportes?range=${range}`, { cache: "no-store" });
    if (!res.ok) return;

    const reportes = await res.json();
    const hash = JSON.stringify(reportes.map(r => r.id || `${r.lat}${r.lng}`));

    if (hash === lastDataHash) return;
    lastDataHash = hash;

    render(reportes);
  } catch {}
}

// RENDER
function render(reportes) {
  markerLayer.clearLayers();

  reportes.forEach(r => {
    if (!r.lat || !r.lng) return;

    const fecha = new Date(r.created_at).toLocaleString('es-UY');

    const popupContent = `
      <div class="popup-header">AVISTAMIENTO</div>
      <div class="popup-loc">${r.ciudad || 'Zona desconocida'}</div>
      <div class="popup-desc">${r.descripcion || ''}</div>
      <div class="popup-footer">${fecha}</div>
    `;

    const marker = L.marker([r.lat, r.lng], { icon: ufoIcon })
      .bindPopup(popupContent);

    markerLayer.addLayer(marker);
  });

  document.getElementById("count").innerText = reportes.length;

  let dens = "BAJA";
  if (reportes.length > 20) dens = "CRÍTICA 🚨";
  else if (reportes.length > 8) dens = "ACTIVA 🛰️";

  document.getElementById("densidad").innerText = dens;
}

// LOOP
loadData();
setInterval(loadData, 5000);
window.addEventListener('resize', () => map.invalidateSize());


// ===============================
// 🛰 REALTIME (AGREGADO)
// ===============================

const SUPABASE_URL = "https://jphasudsyxvxarpemfmj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwaGFzdWRzeXh2eGFycGVtZm1qIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjQ2MjIzOSwiZXhwIjoyMDg4MDM4MjM5fQ.19pUTaRB_Z9T-Ga-UjRxzonKX0ExRqn0VwhEOr49JKg";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

supabaseClient
  .channel('realtime-reportes')
  .on('postgres_changes',
    { event: 'INSERT', schema: 'public', table: 'reportes' },
    (payload) => {
      const r = payload.new;
      if (!r.lat || !r.lng) return;

      const fecha = new Date(r.created_at).toLocaleString('es-UY');

      const popupContent = `
        <div class="popup-header">AVISTAMIENTO</div>
        <div class="popup-loc">${r.ciudad || 'Zona desconocida'}</div>
        <div class="popup-desc">${r.descripcion || ''}</div>
        <div class="popup-footer">${fecha}</div>
      `;

      const marker = L.marker([r.lat, r.lng], { icon: ufoIcon })
        .bindPopup(popupContent);

      markerLayer.addLayer(marker);

      triggerPush();

      const countEl = document.getElementById("count");
      countEl.innerText = parseInt(countEl.innerText || 0) + 1;
    }
  )
  .subscribe();

</script>

</body>
</html>
