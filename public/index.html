<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>RADAR TÁCTICO AIFU</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body, html {
margin:0;
padding:0;
height:100%;
width:100%;
background:#0b0e11;
font-family:'Courier New', monospace;
}

#map {
height:100vh;
width:100vw;
background:#0b0e11;
}

.ui-panel {
position:absolute;
top:20px;
left:20px;
z-index:1000;
background:rgba(10,25,10,0.9);
border:2px solid #0f0;
color:#0f0;
padding:15px;
border-radius:4px;
min-width:200px;
pointer-events:none;
}

.ovni-glow {
background-color:#0f0;
border:2px solid #fff;
border-radius:50%;
box-shadow:0 0 15px 5px rgba(0,255,0,0.6);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:1;}
50%{transform:scale(1.3);opacity:0.7;}
100%{transform:scale(1);opacity:1;}
}

.leaflet-popup-content-wrapper{
background:rgba(5,15,5,0.95);
color:#0f0;
border:1px solid #0f0;
border-radius:0;
}

.leaflet-popup-tip{
background:#0f0;
}
</style>
</head>

<body>

<div class="ui-panel">
<div style="font-weight:bold;border-bottom:1px solid #0f0;margin-bottom:8px;">🛰️ RADAR AIFU</div>
<div id="stat-count">REPORTES HOY: 0</div>
<div style="font-size:0.8em;color:#8f8;margin-top:5px;">SISTEMA: ONLINE</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

<script>

var map = L.map('map', { zoomControl:false, tap:false })
.setView([-32.522779,-55.765835],6);

var markersLayer = L.layerGroup().addTo(map);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{ attribution:'AIFU TACTICAL NETWORK'}
).addTo(map);

var heatLayer = L.heatLayer([],{
radius:35,
blur:20,
gradient:{0.4:'cyan',0.6:'lime',0.8:'yellow',1.0:'red'}
}).addTo(map);

var ovniIcon = L.divIcon({
className:'ovni-glow',
iconSize:[12,12],
iconAnchor:[6,6],
popupAnchor:[0,-10]
});

async function cargarDatos(){

try{

/* EVITA CACHE DEL NAVEGADOR */
const response = await fetch('/api/reportes?nocache=' + Date.now());

const data = await response.json();

document.getElementById('stat-count').innerText =
"REPORTES HOY: " + data.length;

markersLayer.clearLayers();

/* FILTRO MÁS SEGURO */
const puntosHeat = data
.filter(d => d.lat !== undefined && d.lng !== undefined)
.map(d => [Number(d.lat), Number(d.lng), 0.6]);

heatLayer.setLatLngs(puntosHeat);

data.forEach(d=>{

if(d.lat !== undefined && d.lng !== undefined){

L.marker(
[Number(d.lat), Number(d.lng)],
{ icon: ovniIcon }
)
.addTo(markersLayer)
.bindPopup(`
<div style="text-align:center">
<b>FANI DETECTADO</b><br>
Lugar: ${d.ciudad || 'S/D'}<br>
Agente: ${d.agente || 'Anónimo'}<br>
<hr style="border:0.5px solid #0f0">
<i>"${d.descripcion || d.tipo || ''}"</i>
</div>
`);

}

});

}catch(e){

console.error("Error cargando datos",e);

}

}

cargarDatos();

/* ACTUALIZA CADA 15 SEGUNDOS */
setInterval(cargarDatos,15000);

</script>

</body>
</html>
