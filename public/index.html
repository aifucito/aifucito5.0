<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>AIFU Radar Neo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #06130a;
}

#map {
  height: 100vh;
  width: 100%;
}

/* PANEL IA */
.ia-panel {
  position: fixed;
  top: 10px;
  left: 10px;
  width: 260px;
  background: rgba(0, 20, 10, 0.85);
  border: 1px solid #00ff88;
  border-radius: 10px;
  padding: 10px;
  color: #00ff88;
  font-size: 12px;
  z-index: 9999;
}

.title { font-weight: bold; margin-bottom: 6px; }

.status { margin-bottom: 6px; }

.heat-bar {
  height: 8px;
  width: 100%;
  background: linear-gradient(to right, #003300, #00ff88, #00ff00);
  border-radius: 5px;
  margin-top: 8px;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  color: #00ff88;
  text-align: center;
  padding: 8px;
  font-size: 13px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="ia-panel">
  <div class="title">Aifucito IA</div>

  <div class="status">Estado: ACTIVO</div>
  <div class="status">Reportes: <span id="hoy">0</span></div>
  <div class="status">Densidad: <span id="densidad">BAJA</span></div>

  <div class="heat-bar"></div>

  <div id="alerta" style="margin-top:8px;color:#7CFFB2;">
    Sin anomalías
  </div>
</div>

<div class="bottom">
Radar AIFU activo
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([-34.9, -56.2], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

function color(n) {
  return n > 10 ? "#00ff00" :
         n > 5 ? "#66ff66" : "#00aa44";
}

let reportes = [];

async function cargar() {

  const res = await fetch("/api/reports");
  reportes = await res.json();

  reportes.forEach(r => {
    if (!r.lat || !r.lng) return;

    L.circleMarker([r.lat, r.lng], {
      radius: 6,
      color: color(1),
      fillColor: color(1),
      fillOpacity: 0.8
    }).addTo(map).bindPopup(r.descripcion || "evento");
  });

  document.getElementById("hoy").innerText = reportes.length;

  let densidad = "BAJA";
  if (reportes.length > 20) densidad = "ALTA";
  else if (reportes.length > 8) densidad = "MEDIA";

  document.getElementById("densidad").innerText = densidad;

  if (densidad === "ALTA") {
    document.getElementById("alerta").innerText =
      "Actividad elevada detectada";
  }
}

cargar();

setInterval(cargar, 10000);

</script>

</body>
</html>
