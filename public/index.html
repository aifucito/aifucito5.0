<!DOCTYPE html>
<html>
<head>
    <title>RADAR TÁCTICO AIFU - CONO SUR</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #e3e3e3; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* PANEL SIEMPRE AL FRENTE */
        .radar-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 260px;
            background: rgba(0, 20, 10, 0.9);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 15px;
            color: #00ff88;
            z-index: 9999; /* Bloquea que los puntos pasen por delante */
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            pointer-events: none;
        }

        .radar-panel h2 { margin: 0 0 10px 0; font-size: 16px; text-transform: uppercase; border-bottom: 1px solid #00ff88; }
        .stat { margin: 5px 0; font-size: 14px; font-weight: bold; }
        .intensidad-bar {
            height: 8px;
            background: linear-gradient(to right, #0044ff, #00ff88);
            margin-top: 10px;
            border-radius: 5px;
        }

        /* EFECTO NEÓN PARA LOS PUNTOS */
        .ufo-icon {
            filter: drop-shadow(0 0 5px #00ff88);
        }
    </style>
</head>
<body>

    <div class="radar-panel" id="ui-panel">
        <h2>🛰️ RADAR TÁCTICO AIFU</h2>
        <div class="stat">REPORTES: <span id="count">0</span></div>
        <div class="stat" id="status-text">SISTEMA ACTIVO</div>
        <div class="intensidad-bar"></div>
        <div style="display: flex; justify-content: space-between; font-size: 9px; margin-top: 5px;">
            <span>DENSIDAD BAJA</span>
            <span>ALTA</span>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- BLOQUEO DE SEGURIDAD ---
        // Si no detecta que se abrió desde el bot, limpia la pantalla
        if (!window.Telegram.WebApp.initData) {
            document.body.innerHTML = `
                <div style="background:black; color:white; height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:20px;">
                    <div>
                        <h1 style="color:#00ff88;">⚠️ ACCESO RESTRINGIDO</h1>
                        <p>Este radar es propiedad de AIFU.<br>Solo accesible desde el Bot oficial.</p>
                    </div>
                </div>`;
            throw new Error("Acceso no autorizado");
        }

        // --- INICIALIZAR TELEGRAM WEBAPP ---
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Abre el radar a pantalla completa automáticamente

        // --- CONFIGURACIÓN DEL MAPA ---
        // Centrado inicial en el Cono Sur (Uruguay/Argentina)
        var map = L.map('map', { zoomControl: false }).setView([-34.7, -56.1], 8);

        // Estilo "HOT" (Claro y topográfico como tu foto)
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: 'AIFU TACTICAL'
        }).addTo(map);

        // Función para pintar puntos
        function agregarPunto(lat, lon, esVip) {
            var color = esVip ? '#00ff88' : '#00ffff'; // Verde para VIP, Celeste para normal
            L.circleMarker([lat, lon], {
                radius: 12,
                color: '#ffffff',
                weight: 2,
                fillColor: color,
                fillOpacity: 0.8,
                className: 'ufo-icon'
            }).addTo(map);
        }

        // --- CARGA DE DATOS ---
        // Pedimos los datos a la ruta segura del bot
        fetch('/radar-data')
            .then(res => res.json())
            .then(data => {
                document.getElementById('count').innerText = data.length;
                
                // Si hay muchos reportes, cambiamos el estado visual
                if(data.length > 10) {
                    document.getElementById('status-text').style.color = "#ff3300";
                    document.getElementById('status-text').innerText = "ALTA ACTIVIDAD DETECTADA";
                }

                data.forEach(p => {
                    // Verificamos que existan coordenadas válidas
                    if(p.lat && p.lon) {
                        agregarPunto(p.lat, p.lon, p.vip);
                    }
                });
            })
            .catch(err => console.error("Error cargando radar:", err));

    </script>
</body>
</html>
