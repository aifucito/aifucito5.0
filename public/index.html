<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>RADAR TÁCTICO AIFU</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,body{
margin:0;
padding:0;
height:100%;
background:#000;
font-family:Arial;
}

#map{
width:100%;
height:100%;
}

/* PANEL RADAR */

.radarPanel{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.7);
border:1px solid #00ff99;
padding:15px;
color:#00ff99;
width:260px;
border-radius:8px;
box-shadow:0 0 15px #00ff99;
}

.radarPanel h2{
margin:0;
font-size:18px;
}

.barra{
height:8px;
background:linear-gradient(to right,#0af,#0f0);
margin-top:8px;
border-radius:4px;
}

/* ICONO OVNI */

.ovniIcon{
font-size:22px;
color:#00ff99;
text-shadow:0 0 10px #00ff99;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="radarPanel">

<h2>RADAR TÁCTICO AIFU</h2>

<div>REPORTES HOY: <span id="count">0</span></div>

<div>ESTADO: <span id="estado">ANALIZANDO</span></div>

<div style="margin-top:10px;">INTENSIDAD</div>

<div class="barra"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>

const map = L.map('map',{zoomControl:false}).setView([-34.6,-58.4],5);

/* MAPA BASE OSCURO */

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
{ attribution:'' }
).addTo(map);

let heatLayer = L.heatLayer([],{
radius:35,
blur:25,
maxZoom:8,
gradient:{
0.2:'#00ffff',
0.4:'#00ff99',
0.6:'#00ff00',
0.8:'#ffff00',
1:'#ff0000'
}
}).addTo(map);

let ovnis = [];

async function actualizarRadar(){

try{

const res = await fetch('/radar');

const data = await res.json();

document.getElementById("count").innerText=data.length;

if(data.length>25)
document.getElementById("estado").innerText="ACTIVO - ALTA DENSIDAD";
else
document.getElementById("estado").innerText="ACTIVO";

let puntos=[];

/* LIMPIAR ICONOS */

ovnis.forEach(o=>map.removeLayer(o));
ovnis=[];

data.forEach(r=>{

puntos.push([r.lat,r.lon,r.peso||0.5]);

const icon=L.divIcon({
className:'ovniIcon',
html:'🛸'
});

const marker=L.marker([r.lat,r.lon],{icon}).addTo(map);

ovnis.push(marker);

});

heatLayer.setLatLngs(puntos);

}catch(e){

console.log("Radar error",e);

}

}

/* ACTUALIZACIÓN AUTOMÁTICA */

actualizarRadar();

setInterval(actualizarRadar,30000);

</script>

</body>
</html>
