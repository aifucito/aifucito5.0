<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>AIFU Radar AI LIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #06130a;
}

#map {
  height: 100vh;
  width: 100%;
}

.ia-panel {
  position: fixed;
  top: 10px;
  left: 10px;
  width: 290px;
  background: rgba(0, 20, 10, 0.85);
  border: 1px solid #00ff88;
  border-radius: 10px;
  padding: 10px;
  color: #00ff88;
  font-size: 12px;
  z-index: 9999;
}

.heat-bar {
  height: 8px;
  width: 100%;
  background: linear-gradient(to right, #003300, #00ff88, #00ff00);
  border-radius: 5px;
  margin-top: 8px;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  color: #00ff88;
  text-align: center;
  padding: 8px;
  font-size: 13px;
}

.push-alert {
  position: fixed;
  top: 120px;
  left: 10px;
  background: rgba(0,255,136,0.15);
  border: 1px solid #00ff88;
  color: #00ff88;
  padding: 10px;
  font-size: 12px;
  border-radius: 8px;
  display: none;
  z-index: 99999;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="ia-panel">
  <div><b>Aifucito IA • NEXUS</b></div>

  <div>Reportes: <span id="count">0</span></div>
  <div>Densidad: <span id="densidad">BAJA</span></div>
  <div>Predicción: <span id="prediccion">ESTABLE</span></div>
  <div>Anomalía global: <span id="anomalia">NO</span></div>

  <div class="heat-bar"></div>

  <div id="alerta" style="margin-top:8px;color:#7CFFB2;">
    Sin anomalías
  </div>
</div>

<div class="push-alert" id="push"></div>

<div class="bottom">RADAR AIFU AI LIVE</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const map = L.map('map').setView([-34.9, -56.2], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

let markersLayer = L.layerGroup().addTo(map);
let heatLayer = L.heatLayer([], { radius: 25, blur: 18 }).addTo(map);

let reportes = [];

/* =========================
   SONIDO CRÍTICO
========================= */

const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

/* =========================
   PUSH ALERT
========================= */

function push(msg, critical=false) {
  const el = document.getElementById("push");
  el.innerText = msg;
  el.style.display = "block";

  if (critical) audio.play();

  setTimeout(() => {
    el.style.display = "none";
  }, 5000);
}

/* =========================
   COLOR
========================= */

function color(n) {
  return n > 10 ? "#00ff00" :
         n > 5 ? "#66ff66" : "#00aa44";
}

/* =========================
   PREDICCIÓN SIMPLE
========================= */

function calcularPrediccion() {

  const total = reportes.length;

  if (total > 25) return "ALTA ACTIVIDAD";
  if (total > 12) return "ACTIVIDAD EN AUMENTO";
  return "ESTABLE";
}

/* =========================
   ANOMALÍA GLOBAL
========================= */

function detectarAnomalia() {

  const total = reportes.length;

  const critico = total > 30;

  return critico;
}

/* =========================
   ZONA CALIENTE
========================= */

function getZonaCaliente() {

  if (reportes.length === 0) return null;

  let max = {};

  reportes.forEach(r => {
    const key = `${Math.round(r.lat)}_${Math.round(r.lng)}`;
    max[key] = (max[key] || 0) + 1;
  });

  let top = null;
  let maxVal = 0;

  for (let k in max) {
    if (max[k] > maxVal) {
      maxVal = max[k];
      top = k;
    }
  }

  if (!top) return null;

  const [lat, lng] = top.split("_").map(Number);

  return { lat, lng, value: maxVal };
}

/* =========================
   RENDER
========================= */

function render() {

  markersLayer.clearLayers();

  let heat = [];

  reportes.forEach(r => {

    if (!r.lat || !r.lng) return;

    markersLayer.addLayer(
      L.circleMarker([r.lat, r.lng], {
        radius: 6,
        color: color(1),
        fillColor: color(1),
        fillOpacity: 0.8
      }).bindPopup(`${r.tipo}<br/>${r.descripcion}`)
    );

    heat.push([r.lat, r.lng, 0.7]);
  });

  heatLayer.setLatLngs(heat);

  document.getElementById("count").innerText = reportes.length;

  const dens = reportes.length > 20 ? "ALTA" :
               reportes.length > 8 ? "MEDIA" : "BAJA";

  document.getElementById("densidad").innerText = dens;

  const pred = calcularPrediccion();
  document.getElementById("prediccion").innerText = pred;

  const anom = detectarAnomalia();
  document.getElementById("anomalia").innerText = anom ? "SI" : "NO";

  document.getElementById("alerta").innerText =
    anom ? "ANOMALÍA GLOBAL DETECTADA" : "Sin anomalías";

  /* 🔴 ZOOM AUTOMÁTICO A ZONA CALIENTE */
  const hot = getZonaCaliente();

  if (hot && hot.value > 5) {
    map.setView([hot.lat, hot.lng], 8, {
      animate: true
    });

    push("Zona caliente detectada", true);
  }

  /* 🔊 ALERTA CRÍTICA */
  if (anom) {
    push("ALERTA GLOBAL CRÍTICA", true);
  }
}

/* =========================
   LOAD
========================= */

async function load() {
  const res = await fetch("/api/reports?range=24h");
  reportes = await res.json();
  render();
}

/* =========================
   SUPABASE LIVE
========================= */

function live() {

  const supabase = window.supabase.createClient(
    "TU_SUPABASE_URL",
    "TU_SUPABASE_KEY"
  );

  supabase.channel('aifu-live')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'reportes'
    }, (payload) => {

      reportes.push(payload.new);

      render();

      push(`Nuevo evento: ${payload.new.tipo} (${payload.new.pais})`,
        payload.new.precision > 2
      );
    })
    .subscribe();
}

/* =========================
   INIT
========================= */

load();
live();

</script>

</body>
</html>
