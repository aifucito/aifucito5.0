<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>AIFU Radar AI LIVE V6.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
/* CSS NÚCLEO: ESTÉTICA DE BASE MILITAR */
body { margin: 0; padding: 0; background: #000; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
#map { height: 100vh; width: 100%; background: #000; }

/* FILTRO NEÓN SIN LÍNEAS DE UNIÓN */
.leaflet-tile-container {
  filter: sepia(100%) hue-rotate(80deg) saturate(800%) brightness(75%) contrast(110%);
}

.leaflet-tile {
  outline: 1px solid transparent;
  box-shadow: 0 0 0 1px transparent;
  border: none !important;
}

.leaflet-objects-pane {
  filter: drop-shadow(0 0 2px #00ff88);
}

/* PANEL DE CONTROL RADAR */
.ia-panel {
  position: fixed; top: 10px; left: 10px; width: 280px;
  background: rgba(0, 15, 5, 0.9); border: 1px solid #00ff88;
  border-radius: 5px; padding: 12px; color: #00ff88;
  font-size: 13px; z-index: 9999; box-shadow: 0 0 15px rgba(0,255,136,0.3);
}
.ia-header { font-size: 16px; font-weight: bold; border-bottom: 1px solid #00ff88; padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.ia-stat { display: flex; justify-content: space-between; margin-bottom: 4px; }
.ia-value { font-weight: bold; color: #fff; text-shadow: 0 0 5px #00ff88; }

select#range {
  width: 100%; margin-top: 10px; background: #000; color: #00ff88;
  border: 1px solid #00ff88; padding: 5px; font-family: inherit; cursor: pointer;
}

/* ALERTA PUSH TÁCTICA */
.push-alert {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0, 20, 10, 0.95); border: 2px solid #ff0000; color: #ff0000;
  padding: 20px 40px; font-size: 18px; font-weight: bold; border-radius: 5px;
  display: none; z-index: 100000; text-transform: uppercase;
  box-shadow: 0 0 30px rgba(255,0,0,0.5); animation: blink 0.5s infinite;
}
@keyframes blink { 50% { opacity: 0.3; } }

/* ICONO UFO (SVG) */
.ufo-icon-container { display: flex; align-items: center; justify-content: center; }
.ufo-svg {
  width: 28px; height: 28px;
  fill: #fff;
  filter: drop-shadow(0 0 4px #00ff88);
  transition: all 0.3s;
}

.ufo-pulse {
  position: absolute; width: 12px; height: 12px;
  background: rgba(0, 255, 136, 0.6); border-radius: 50%;
  animation: pulse-beacon 2s infinite; z-index: -1;
}
@keyframes pulse-beacon {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(5); opacity: 0; }
}

/* POPUPS TÁCTICOS */
.leaflet-popup-content-wrapper {
  background: rgba(0, 10, 5, 0.95) !important; border: 1px solid #00ff88 !important;
  color: #fff !important; font-family: 'Courier New', monospace !important; font-size: 12px; border-radius: 2px;
}
.leaflet-popup-tip { background: #00ff88 !important; }
.popup-header { color: #00ff88; font-weight: bold; border-bottom: 1px solid #00ff88; margin-bottom: 5px; text-transform: uppercase; }
.popup-loc { color: #fff; font-weight: bold; font-size: 13px; margin-bottom: 3px; }
.popup-desc { margin: 8px 0; line-height: 1.4; color: #00ff88; }
.popup-footer { border-top: 1px solid #333; padding-top: 5px; color: #555; font-size: 10px; }

.leaflet-container { background-color: #000 !important; }
</style>
</head>

<body>

<div id="map"></div>

<div class="ia-panel">
  <div class="ia-header">RADAR AIFU V6.0</div>
  <div class="ia-stat">Estado: <span class="ia-value">OPERATIVO ✔</span></div>
  <div class="ia-stat">Detecciones: <span class="ia-value" id="count">0</span></div>
  <div class="ia-stat">Densidad: <span class="ia-value" id="densidad">...</span></div>

  <select id="range" onchange="loadData()">
    <option value="24h">Últimas 24 horas</option>
    <option value="7d">Últimos 7 días</option>
    <option value="all" selected>Todo el registro</option>
  </select>
  <div style="font-size:9px; color:#555; text-align:center; margin-top:8px;">Actualización automática: 30s</div>
</div>

<div class="push-alert" id="push">🚨 ANOMALÍA DETECTADA 🚨</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Inicialización centrada en el Cono Sur (Uruguay/Argentina)
const map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([-34.6, -58.4], 6);

// Capa de mapa oscuro de CARTO
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 18
}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);
let lastReportCount = 0;

// Definición del Icono UFO Personalizado
const ufoIcon = L.divIcon({
  className: 'ufo-icon-container',
  html: `
    <div class="ufo-pulse"></div>
    <svg class="ufo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="55" rx="45" ry="15" fill="none" stroke="#00ff88" stroke-width="2"/>
      <path d="M 25 50 C 25 25, 75 25, 75 50" fill="none" stroke="#00ff88" stroke-width="2"/>
      <circle cx="30" cy="62" r="2" fill="#00ff88"/>
      <circle cx="50" cy="65" r="2" fill="#00ff88"/>
      <circle cx="70" cy="62" r="2" fill="#00ff88"/>
    </svg>
  `,
  iconSize: [32, 32],
  iconAnchor: [16, 16],
  popupAnchor: [0, -15]
});

function triggerPush() {
  const el = document.getElementById("push");
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 4000);
}

async function loadData() {
  const range = document.getElementById("range").value;
  try {
    // LLAMADA A TU BOT (Ruta corregida a /api/reportes)
    const res = await fetch(`/api/reportes?range=${range}`);
    if (!res.ok) throw new Error("Fallo en red");
    const reportes = await res.json();
    
    // Alerta de nuevo avistamiento
    if (lastReportCount !== 0 && reportes.length > lastReportCount) {
      triggerPush();
    }
    lastReportCount = reportes.length;
    
    render(reportes);
  } catch (e) {
    console.error("⚠️ Error de conexión con el RADAR AIFU.");
  }
}

function render(reportes) {
  markerLayer.clearLayers();
  
  reportes.forEach(r => {
    if (!r.lat || !r.lng) return;

    const fecha = new Date(r.created_at).toLocaleString('es-UY', { 
        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' 
    });

    const popupContent = `
      <div class="popup-header">DATOS DE AVISTAMIENTO</div>
      <div class="popup-loc">${r.ciudad || 'Zona No Identificada'} (${r.pais || '??'})</div>
      <div class="popup-desc">"${r.descripcion || 'Sin relato detallado.'}"</div>
      <div class="popup-footer">FECHA: ${fecha} | AGENTE: CONFIDENCIAL</div>
    `;

    const marker = L.marker([r.lat, r.lng], { icon: ufoIcon }).bindPopup(popupContent);
    markerLayer.addLayer(marker);
  });

  // Actualizar estadísticas del panel
  document.getElementById("count").innerText = reportes.length;
  let dens = "BAJA";
  if (reportes.length > 20) dens = "CRÍTICA 🚨";
  else if (reportes.length > 8) dens = "ACTIVA 🛰️";
  document.getElementById("densidad").innerText = dens;
}

// Ejecución inicial y ciclo de refresco (30s)
loadData();
setInterval(loadData, 30000);

// Ajuste automático al redimensionar ventana
window.addEventListener('resize', () => map.invalidateSize());
</script>

</body>
</html>
