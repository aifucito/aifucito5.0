<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>AIFU Radar AI LIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #06130a;
}

#map {
  height: 100vh;
  width: 100%;
}

.ia-panel {
  position: fixed;
  top: 10px;
  left: 10px;
  width: 300px;
  background: rgba(0, 20, 10, 0.85);
  border: 1px solid #00ff88;
  border-radius: 10px;
  padding: 10px;
  color: #00ff88;
  font-size: 12px;
  z-index: 9999;
}

select {
  width: 100%;
  margin-top: 8px;
  background: black;
  color: #00ff88;
  border: 1px solid #00ff88;
}

.push-alert {
  position: fixed;
  top: 120px;
  left: 10px;
  background: rgba(0,255,136,0.15);
  border: 1px solid #00ff88;
  color: #00ff88;
  padding: 10px;
  font-size: 12px;
  border-radius: 8px;
  display: none;
  z-index: 99999;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="ia-panel">
  <b>AIFU Radar AI LIVE</b>

  <div>Reportes: <span id="count">0</span></div>
  <div>Densidad: <span id="densidad">BAJA</span></div>

  <div style="margin-top:8px;">Rango:</div>
  <select id="range" onchange="loadData()">
    <option value="24h">24 horas</option>
    <option value="7d">7 días</option>
    <option value="1m">1 mes</option>
    <option value="3m">3 meses</option>
    <option value="6m">6 meses</option>
    <option value="9m">9 meses</option>
    <option value="1y">1 año</option>
  </select>
</div>

<div class="push-alert" id="push"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>

const map = L.map('map').setView([-34.9, -56.2], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

let markers = L.layerGroup().addTo(map);
let heat = L.heatLayer([], { radius: 25, blur: 18 }).addTo(map);

let reportes = [];

/* PUSH */
function push(msg) {
  const el = document.getElementById("push");
  el.innerText = msg;
  el.style.display = "block";

  setTimeout(() => el.style.display = "none", 4000);
}

/* LOAD DATA (FIX PRINCIPAL) */
async function loadData() {

  const range = document.getElementById("range").value;

  try {
    const res = await fetch(`/api/reports?range=${range}`);
    reportes = await res.json();
  } catch (e) {

    console.log("Modo demo activo");

    reportes = [
      { lat: -34.9, lng: -56.2, descripcion: "TEST MONTEVIDEO" },
      { lat: -34.7, lng: -56.1, descripcion: "TEST SUR" },
      { lat: -34.8, lng: -55.9, descripcion: "TEST ESTE" }
    ];
  }

  render();
}

/* RENDER */
function render() {

  markers.clearLayers();

  let heatData = [];

  reportes.forEach(r => {

    if (!r || !r.lat || !r.lng) return;

    const marker = L.circleMarker([r.lat, r.lng], {
      radius: 5,
      color: "#00ff88",
      fillColor: "#00ff88",
      fillOpacity: 0.7
    }).bindPopup(r.descripcion || "evento");

    markers.addLayer(marker);

    heatData.push([r.lat, r.lng, 0.6]);
  });

  heat.setLatLngs(heatData);

  document.getElementById("count").innerText = reportes.length;

  let dens = "BAJA";
  if (reportes.length > 20) dens = "ALTA";
  else if (reportes.length > 8) dens = "MEDIA";

  document.getElementById("densidad").innerText = dens;

  setTimeout(() => map.invalidateSize(), 200);
}

/* INIT */
loadData();

</script>

</body>
</html>
