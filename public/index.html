<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🛸 AIFU RADAR</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: #000;
  font-family: 'Courier New', Courier, monospace;
  color: #00ff88;
  overflow: hidden;
}

#map {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #000;
}

#panel {
  position: absolute;
  top: 15px;
  left: 15px;
  z-index: 1000;
  background: rgba(0,20,0,0.85);
  border: 1px solid #00ff88;
  padding: 15px;
  min-width: 180px;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
}

.stat-label { font-size: 10px; text-transform: uppercase; opacity: 0.7; margin-bottom: 2px; }
.stat-value { font-size: 18px; font-weight: bold; margin-bottom: 10px; }

#range {
  width: 100%;
  background: #000;
  color: #00ff88;
  border: 1px solid #00ff88;
  padding: 5px;
  cursor: pointer;
  outline: none;
}

.ufo-icon-container {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px !important;
  height: 40px !important;
}

.ufo-pulse {
  position: absolute;
  width: 40px;
  height: 40px;
  border: 2px solid #00ff88;
  border-radius: 50%;
  animation: pulse 2s infinite;
  pointer-events: none;
}

@keyframes pulse {
  0% { transform: scale(0.3); opacity: 1; }
  100% { transform: scale(1.5); opacity: 0; }
}

.ufo-svg {
  width: 32px;
  height: 32px;
  filter: drop-shadow(0 0 8px #00ff88);
  z-index: 10;
}

.leaflet-popup-content-wrapper {
  background: rgba(0, 10, 0, 0.95) !important;
  color: #00ff88 !important;
  border: 1px solid #00ff88;
  border-radius: 0;
}
.leaflet-popup-tip { background: #00ff88; }

#push {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #00ff88;
  color: #000;
  padding: 10px 25px;
  font-weight: bold;
  display: none;
  z-index: 2000;
  border-radius: 2px;
  box-shadow: 0 0 20px #00ff88;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <div class="stat-label">📡 Reportes en Rango:</div>
  <div id="count" class="stat-value">0</div>
  
  <div class="stat-label">🛰️ Densidad Actual:</div>
  <div id="densidad" class="stat-value" style="color: #00ff88;">BAJA</div>

  <div class="stat-label">⏱️ Filtro Temporal:</div>
  <select id="range">
    <option value="24">Últimas 24h</option>
    <option value="168">Últimos 7 días</option>
    <option value="720">Últimos 30 días</option>
    <option value="historico">Histórico</option>
  </select>
</div>

<div id="push">🚨 SEÑAL ENTRANTE DETECTADA</div>

<script>

const map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([-30.0, -60.0], 4);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 18
}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);
let lastDataHash = "";

const ufoIcon = L.divIcon({
  className: 'ufo-icon-container',
  html: `
    <div class="ufo-pulse"></div>
    <svg class="ufo-svg" viewBox="0 0 100 100">
      <ellipse cx="50" cy="55" rx="45" ry="15" fill="none" stroke="#00ff88" stroke-width="2"/>
      <path d="M 25 50 C 25 25, 75 25, 75 50" fill="none" stroke="#00ff88" stroke-width="2"/>
      <circle cx="30" cy="62" r="2" fill="#00ff88"/>
      <circle cx="50" cy="65" r="2" fill="#00ff88"/>
      <circle cx="70" cy="62" r="2" fill="#00ff88"/>
    </svg>
  `,
  iconSize: [40, 40],
  iconAnchor: [20, 20] 
});

function triggerPush() {
  const el = document.getElementById("push");
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 5000);
}

async function loadData() {
  const range = document.getElementById("range").value;

  let url = "/api/reportes";

  if (range === "historico") {
    url = "/api/reportes?modo=historico";
  } else {
    url = `/api/reportes?horas=${range}`;
  }

  try {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) return;

    const reportes = await res.json();

    const hash = JSON.stringify(reportes.map(r => r.id));
    if (hash === lastDataHash) return;
    lastDataHash = hash;

    render(reportes);

  } catch (err) {
    console.error("Fallo de conexión radar:", err);
  }
}

function render(reportes) {
  markerLayer.clearLayers();
  const total = reportes.length;
  document.getElementById("count").innerText = total;

  reportes.forEach(r => {
    if (!r.lat || !r.lng) return;
    const fecha = new Date(r.created_at).toLocaleString('es-UY');

    L.marker([r.lat, r.lng], { icon: ufoIcon })
      .bindPopup(`
        <div><b>ID:</b> ${r.id.toString().slice(-6)}</div>
        <div>${r.descripcion}</div>
        <div style="font-size:10px;">${fecha}</div>
      `)
      .addTo(markerLayer);
  });

  const densEl = document.getElementById("densidad");
  if (total > 20) {
    densEl.innerText = "CRÍTICA 🚨";
    densEl.style.color = "#ff4444";
  } else if (total > 5) {
    densEl.innerText = "ACTIVA 🛰️";
    densEl.style.color = "#ffff00";
  } else {
    densEl.innerText = "BAJA";
    densEl.style.color = "#00ff88";
  }
}

document.getElementById("range").addEventListener("change", () => {
  lastDataHash = "";
  loadData();
});

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
