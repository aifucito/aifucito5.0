<script>
        const tg = window.Telegram.WebApp;

        // ESTA VERSIÓN NO TIENE BLOQUEO PARA QUE PUEDAS ENTRAR YA MISMO
        function iniciarApp() {
            document.getElementById('loading').style.display = 'none';
            tg.ready();
            tg.expand();

            var map = L.map('map', { zoomControl: false }).setView([-34.6, -56.2], 7);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: 'AIFU'
            }).addTo(map);

            var layerGroup = L.layerGroup().addTo(map);

            function actualizarRadar() {
                fetch('/radar-data')
                    .then(res => res.json())
                    .then(data => {
                        layerGroup.clearLayers();
                        document.getElementById('count').innerText = data.length;
                        
                        data.forEach(p => {
                            var color = p.vip ? '#00ff88' : '#00ffff';
                            var m = L.circleMarker([p.lat, p.lon], {
                                radius: 10, color: '#fff', weight: 1, fillColor: color, fillOpacity: 0.7
                            });
                            m.bindPopup(`<b>AGENTE:</b> ${p.agente || 'Anon'}<br><b>DESC:</b> ${p.desc || 'Sin datos'}`);
                            m.addTo(layerGroup);
                        });
                    }).catch(err => {
                        console.error("Error cargando puntos:", err);
                        // Si falla la carga, mostramos un error en el panel
                        document.getElementById('alert-status').innerText = "❌ ERROR DE CONEXIÓN";
                    });
            }

            actualizarRadar();
            setInterval(actualizarRadar, 15000);
        }

        // Entramos directo, sin preguntar quién sos
        window.onload = iniciarApp;
    </script>
