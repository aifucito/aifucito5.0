<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RADAR AIFU - CONO SUR</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body {
    margin: 0;
    background: black;
    font-family: monospace;
    color: #00ff88;
}

#map {
    height: 100vh;
    width: 100%;
    filter: brightness(0.85) contrast(1.3);
}

.panel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0,0,0,0.7);
    padding: 10px;
    border: 1px solid #00ff88;
    border-radius: 8px;
}

.bottom-panel {
    position: absolute;
    bottom: 15px;
    left: 15px;
    width: 260px;
    background: rgba(0,0,0,0.7);
    padding: 10px;
    border: 1px solid #00ff88;
    border-radius: 8px;
}

.pulse {
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 0.9; }
    100% { transform: scale(3); opacity: 0; }
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
    <div id="status">INICIANDO...</div>
    <div>Total: <span id="count">0</span></div>
</div>

<div class="bottom-panel">
    <div>FILTRO TIEMPO</div>
    <input id="timeRange" type="range" min="1" max="3" step="1" value="1" style="width:100%;">
    <div id="timeLabel">Últimas 24h</div>

    <button onclick="togglePlayback()" style="margin-top:10px;width:100%;">
        ▶ REPRODUCIR
    </button>
</div>

<audio id="alertSound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const map = L.map('map').setView([-34.5, -58], 5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const markers = L.layerGroup().addTo(map);
const linesLayer = L.layerGroup().addTo(map);
const pulseLayer = L.layerGroup().addTo(map);

let heatLayer;
let currentData = [];
let playback = false;
let playbackIndex = 0;

// ----------------------
// TIEMPO
// ----------------------
function getTimeLimit() {
    const val = document.getElementById("timeRange").value;

    if (val == 1) { document.getElementById("timeLabel").innerText = "Últimas 24h"; return 86400000; }
    if (val == 2) { document.getElementById("timeLabel").innerText = "Última semana"; return 604800000; }
    if (val == 3) { document.getElementById("timeLabel").innerText = "Último mes"; return 2592000000; }
}

// ----------------------
// DISTANCIA REAL
// ----------------------
function distanciaKm(a, b) {
    const R = 6371;
    const dLat = (b.lat - a.lat) * Math.PI/180;
    const dLon = (b.lon - a.lon) * Math.PI/180;

    const lat1 = a.lat * Math.PI/180;
    const lat2 = b.lat * Math.PI/180;

    const x = Math.sin(dLat/2) ** 2 +
              Math.sin(dLon/2) ** 2 * Math.cos(lat1) * Math.cos(lat2);

    return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

// ----------------------
// ACTUALIZAR
// ----------------------
function actualizar() {

    fetch(`/radar-data?user=${tg.initDataUnsafe.user?.id}`)
    .then(res => res.json())
    .then(data => {

        const limite = Date.now() - getTimeLimit();

        currentData = data
            .filter(p => p.ts && p.ts > limite)
            .sort((a,b) => a.ts - b.ts);

        renderMapa(currentData);
        detectarZonas(currentData);

        document.getElementById("status").innerText = "VIGILANCIA ACTIVA";
        document.getElementById("status").style.color = "#00ff88";
    })
    .catch(() => {
        document.getElementById("status").innerText = "⚠️ SIN CONEXIÓN";
        document.getElementById("status").style.color = "red";
    });
}

// ----------------------
// RENDER
// ----------------------
function renderMapa(data) {

    markers.clearLayers();
    linesLayer.clearLayers();
    pulseLayer.clearLayers();

    if (heatLayer) map.removeLayer(heatLayer);

    let heatPoints = [];
    let linePoints = [];

    data.forEach(p => {

        heatPoints.push([p.lat, p.lon, 1]);
        linePoints.push([p.lat, p.lon]);

        L.circleMarker([p.lat, p.lon], {
            radius: 6,
            color: "#00ff88",
            fillColor: "#00ff88",
            fillOpacity: 0.8
        }).addTo(markers);
    });

    // LINEAS DE MOVIMIENTO
    if (linePoints.length > 1) {
        L.polyline(linePoints, {
            color: "#00ff88",
            weight: 2,
            opacity: 0.5
        }).addTo(linesLayer);
    }

    heatLayer = L.heatLayer(heatPoints, {
        radius: 35,
        blur: 25,
        gradient: {
            0.2: '#0044ff',
            0.4: '#00ff88',
            0.7: '#ffff00',
            1.0: '#ff0000'
        }
    }).addTo(map);

    document.getElementById('count').innerText = data.length;
}

// ----------------------
// ZONAS CALIENTES
// ----------------------
function detectarZonas(data) {

    let clusters = [];

    data.forEach(p => {
        let grupo = data.filter(o => distanciaKm(p, o) < 10);

        if (grupo.length >= 5) {
            clusters.push(grupo);
        }
    });

    if (clusters.length > 0) {
        activarAlerta(clusters);
    } else {
        desactivarAlerta();
    }
}

// ----------------------
// ALERTA + PULSO
// ----------------------
function activarAlerta(clusters) {

    const status = document.getElementById('status');
    status.innerText = "🚨 ALERTA ROJA";
    status.style.color = "red";

    document.body.style.boxShadow = "0 0 60px red inset";

    document.getElementById("alertSound").play();

    clusters.forEach(grupo => {

        const centro = grupo[0];

        const circle = L.circle([centro.lat, centro.lon], {
            radius: 8000,
            color: "red",
            fillColor: "red",
            fillOpacity: 0.3
        }).addTo(pulseLayer);

        const el = circle._path;
        if (el) el.classList.add("pulse");
    });
}

function desactivarAlerta() {

    document.getElementById('status').innerText = "VIGILANCIA ACTIVA";
    document.getElementById('status').style.color = "#00ff88";
    document.body.style.boxShadow = "none";
}

// ----------------------
// PLAYBACK
// ----------------------
function togglePlayback() {
    playback = !playback;
    playbackIndex = 0;
    if (playback) reproducir();
}

function reproducir() {
    if (!playback) return;

    let subset = currentData.slice(0, playbackIndex);
    renderMapa(subset);

    playbackIndex++;

    if (playbackIndex <= currentData.length) {
        setTimeout(reproducir, 300);
    } else {
        playback = false;
    }
}

// ----------------------
setInterval(actualizar, 30000);
actualizar();
</script>

</body>
</html>
