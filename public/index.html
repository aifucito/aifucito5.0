<script>

var map = L.map('map', { zoomControl:false, tap:false })
.setView([-32.522779,-55.765835],6);

var markersLayer = L.layerGroup().addTo(map);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{ attribution:'AIFU TACTICAL NETWORK'}
).addTo(map);

var heatLayer = L.heatLayer([],{
radius:35,
blur:20,
gradient:{0.4:'cyan',0.6:'lime',0.8:'yellow',1.0:'red'}
}).addTo(map);

var ovniIcon = L.divIcon({
className:'ovni-glow',
iconSize:[12,12],
iconAnchor:[6,6],
popupAnchor:[0,-10]
});

let puntosHeat = [];

/* =========================
   CARGA INICIAL
========================= */

async function cargarDatos(){

const response = await fetch('/api/reportes?nocache=' + Date.now());
const data = await response.json();

document.getElementById('stat-count').innerText =
"REPORTES HOY: " + data.length;

markersLayer.clearLayers();
puntosHeat = [];

data.forEach(d => {

if(d.lat !== undefined && d.lng !== undefined){

const lat = Number(d.lat);
const lng = Number(d.lng);

puntosHeat.push([lat,lng,0.6]);

L.marker([lat,lng],{icon:ovniIcon})
.addTo(markersLayer)
.bindPopup(`
<b>FANI DETECTADO</b><br>
Lugar: ${d.ciudad || 'S/D'}<br>
Agente: ${d.agente || 'Anónimo'}<br>
<i>${d.descripcion || d.tipo || ''}</i>
`);

}

});

heatLayer.setLatLngs(puntosHeat);

}

cargarDatos();

/* =========================
   CANAL EN TIEMPO REAL
========================= */

const eventos = new EventSource('/api/live');

eventos.onmessage = function(event){

const d = JSON.parse(event.data);

if(d.lat && d.lng){

const lat = Number(d.lat);
const lng = Number(d.lng);

puntosHeat.push([lat,lng,0.6]);
heatLayer.setLatLngs(puntosHeat);

L.marker([lat,lng],{icon:ovniIcon})
.addTo(markersLayer)
.bindPopup(`
<b>FANI DETECTADO</b><br>
Lugar: ${d.ciudad || 'S/D'}<br>
Agente: ${d.agente || 'Anónimo'}<br>
<i>${d.descripcion || d.tipo || ''}</i>
`)
.openPopup();

}

};

</script>
