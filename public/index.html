<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>AIFU Radar Neo LIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #06130a;
}

#map {
  height: 100vh;
  width: 100%;
}

/* PANEL IA */
.ia-panel {
  position: fixed;
  top: 10px;
  left: 10px;
  width: 280px;
  background: rgba(0, 20, 10, 0.85);
  border: 1px solid #00ff88;
  border-radius: 10px;
  padding: 10px;
  color: #00ff88;
  font-size: 12px;
  z-index: 9999;
}

.title { font-weight: bold; margin-bottom: 6px; }
.status { margin-bottom: 6px; }

.heat-bar {
  height: 8px;
  width: 100%;
  background: linear-gradient(to right, #003300, #00ff88, #00ff00);
  border-radius: 5px;
  margin-top: 8px;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  color: #00ff88;
  text-align: center;
  padding: 8px;
  font-size: 13px;
}

/* ALERTA PUSH */
.push-alert {
  position: fixed;
  top: 120px;
  left: 10px;
  background: rgba(0,255,136,0.15);
  border: 1px solid #00ff88;
  color: #00ff88;
  padding: 10px;
  font-size: 12px;
  border-radius: 8px;
  display: none;
  z-index: 99999;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="ia-panel">
  <div class="title">Aifucito IA LIVE</div>

  <div class="status">Estado: ACTIVO</div>
  <div class="status">Reportes: <span id="count">0</span></div>
  <div class="status">Densidad: <span id="densidad">BAJA</span></div>

  <div class="heat-bar"></div>

  <div id="alerta" style="margin-top:8px;color:#7CFFB2;">
    Sin anomalías
  </div>
</div>

<div class="push-alert" id="push"></div>

<div class="bottom">
RADAR AIFU LIVE - sin refresh
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* =========================
   MAPA BASE
========================= */

const map = L.map('map').setView([-34.9, -56.2], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

/* =========================
   CAPAS
========================= */

let markersLayer = L.layerGroup().addTo(map);
let heatLayer = L.heatLayer([], { radius: 25, blur: 20 }).addTo(map);

/* =========================
   SUPABASE LIVE
========================= */

const supabaseUrl = "TU_SUPABASE_URL";
const supabaseKey = "TU_SUPABASE_KEY";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

let reportes = [];

/* =========================
   COLOR INTENSIDAD
========================= */

function intensidad(n) {
  return n > 10 ? "#00ff00" :
         n > 5 ? "#66ff66" : "#00aa44";
}

/* =========================
   ALERTA PUSH
========================= */

function push(msg) {
  const el = document.getElementById("push");
  el.innerText = msg;
  el.style.display = "block";

  setTimeout(() => {
    el.style.display = "none";
  }, 5000);
}

/* =========================
   RENDER MAPA
========================= */

function render() {

  markersLayer.clearLayers();

  let heatPoints = [];

  reportes.forEach(r => {

    if (!r.lat || !r.lng) return;

    markersLayer.addLayer(
      L.circleMarker([r.lat, r.lng], {
        radius: 6,
        color: intensidad(1),
        fillColor: intensidad(1),
        fillOpacity: 0.8
      }).bindPopup(`
        <b>${r.tipo}</b><br/>
        ${r.descripcion}<br/>
        ${r.pais}
      `)
    );

    heatPoints.push([r.lat, r.lng, 0.6]);
  });

  heatLayer.setLatLngs(heatPoints);

  document.getElementById("count").innerText = reportes.length;

  let d = "BAJA";
  if (reportes.length > 20) d = "ALTA";
  else if (reportes.length > 8) d = "MEDIA";

  document.getElementById("densidad").innerText = d;

  document.getElementById("alerta").innerText =
    d === "ALTA" ? "Zona crítica activa" : "Sin anomalías";
}

/* =========================
   CARGA INICIAL
========================= */

async function load() {
  const res = await fetch("/api/reports?range=24h");
  reportes = await res.json();
  render();
}

/* =========================
   LIVE REAL TIME (SUPABASE)
========================= */

function live() {

  const channel = supabase
    .channel('realtime-reportes')
    .on('postgres_changes',
      {
        event: 'INSERT',
        schema: 'public',
        table: 'reportes'
      },
      (payload) => {

        const r = payload.new;
        reportes.push(r);

        render();

        push(`Nuevo evento: ${r.tipo} en ${r.pais}`);
      }
    )
    .subscribe();
}

/* =========================
   INIT
========================= */

load();
live();

</script>

</body>
</html>
