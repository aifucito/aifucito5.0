<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>AIFU Radar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
  }

  #map {
    height: 100vh;
    width: 100%;
  }

  .panel {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.7);
    padding: 10px;
    text-align: center;
  }
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
🛰️ Radar AIFU activo
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// Crear mapa centrado en Uruguay
const map = L.map('map').setView([-34.9, -56.2], 6);

// Cargar tiles (MAPA REAL)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
}).addTo(map);

// Cargar reportes
async function cargarReportes() {
  try {
    const res = await fetch("reportes.json");
    const data = await res.json();

    data.forEach(r => {
      if (r.lat && r.lng) {
        L.marker([r.lat, r.lng])
          .addTo(map)
          .bindPopup(r.texto || "Avistamiento");
      }
    });

  } catch (e) {
    console.log("Error cargando reportes");
  }
}

cargarReportes();

</script>

</body>
</html>
