<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🛸 AIFU RADAR</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: #000;
  font-family: 'Courier New', Courier, monospace; /* Tono más técnico */
  color: #00ff88;
  overflow: hidden;
}

#map {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #000;
}

#panel {
  position: absolute;
  top: 15px;
  left: 15px;
  z-index: 1000;
  background: rgba(0,20,0,0.85);
  border: 1px solid #00ff88;
  padding: 15px;
  min-width: 180px;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
}

.stat-label { font-size: 10px; text-transform: uppercase; opacity: 0.7; margin-bottom: 2px; }
.stat-value { font-size: 18px; font-weight: bold; margin-bottom: 10px; }

#range {
  width: 100%;
  background: #000;
  color: #00ff88;
  border: 1px solid #00ff88;
  padding: 5px;
  cursor: pointer;
  outline: none;
}

/* --- CORRECCIÓN DE ANCLAJE DE ICONOS --- */
.ufo-icon-container {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px !important;
  height: 40px !important;
}

.ufo-pulse {
  position: absolute;
  width: 40px;
  height: 40px;
  border: 2px solid #00ff88;
  border-radius: 50%;
  animation: pulse 2s infinite;
  pointer-events: none;
}

@keyframes pulse {
  0% { transform: scale(0.3); opacity: 1; }
  100% { transform: scale(1.5); opacity: 0; }
}

.ufo-svg {
  width: 32px;
  height: 32px;
  filter: drop-shadow(0 0 8px #00ff88);
  z-index: 10;
}

/* Popups con estilo de terminal */
.leaflet-popup-content-wrapper {
  background: rgba(0, 10, 0, 0.95) !important;
  color: #00ff88 !important;
  border: 1px solid #00ff88;
  border-radius: 0;
}
.leaflet-popup-tip { background: #00ff88; }

#push {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #00ff88;
  color: #000;
  padding: 10px 25px;
  font-weight: bold;
  display: none;
  z-index: 2000;
  border-radius: 2px;
  box-shadow: 0 0 20px #00ff88;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <div class="stat-label">📡 Reportes en Rango:</div>
  <div id="count" class="stat-value">0</div>
  
  <div class="stat-label">🛰️ Densidad Actual:</div>
  <div id="densidad" class="stat-value" style="color: #00ff88;">BAJA</div>

  <div class="stat-label">⏱️ Filtro Temporal:</div>
  <select id="range">
    <option value="24h">Últimas 24h</option>
    <option value="7d">Últimos 7 días</option>
    <option value="1m">Último mes</option>
  </select>
</div>

<div id="push">🚨 SEÑAL ENTRANTE DETECTADA</div>

<script>
// ===============================
// 🛰 CONFIGURACIÓN RADAR
// ===============================

const map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([-30.0, -60.0], 4);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 18
}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);
let lastDataHash = "";

// Icono con anclaje central perfecto [20, 20]
const ufoIcon = L.divIcon({
  className: 'ufo-icon-container',
  html: `
    <div class="ufo-pulse"></div>
    <svg class="ufo-svg" viewBox="0 0 100 100">
      <ellipse cx="50" cy="55" rx="45" ry="15" fill="none" stroke="#00ff88" stroke-width="2"/>
      <path d="M 25 50 C 25 25, 75 25, 75 50" fill="none" stroke="#00ff88" stroke-width="2"/>
      <circle cx="30" cy="62" r="2" fill="#00ff88"/>
      <circle cx="50" cy="65" r="2" fill="#00ff88"/>
      <circle cx="70" cy="62" r="2" fill="#00ff88"/>
    </svg>
  `,
  iconSize: [40, 40],
  iconAnchor: [20, 20] 
});

// Función de alerta visual
function triggerPush() {
  const el = document.getElementById("push");
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 5000);
}

// Carga de datos con filtro dinámico
async function loadData() {
  const range = document.getElementById("range").value;
  try {
    const res = await fetch(`/api/reportes?range=${range}`, { cache: "no-store" });
    if (!res.ok) return;
    const reportes = await res.json();
    
    // El hash ahora depende del contenido para detectar cambios
    const hash = JSON.stringify(reportes.map(r => r.id));
    if (hash === lastDataHash) return;
    lastDataHash = hash;

    render(reportes);
  } catch (err) {
    console.error("Fallo de conexión radar:", err);
  }
}

// Renderizado que ajusta el panel según lo filtrado
function render(reportes) {
  markerLayer.clearLayers();
  const total = reportes.length;
  
  // Actualizar contador visual según el filtro
  document.getElementById("count").innerText = total;

  reportes.forEach(r => {
    if (!r.lat || !r.lng) return;
    const fecha = new Date(r.created_at).toLocaleString('es-UY');
    const popupContent = `
      <div style="font-weight:bold; border-bottom:1px solid #00ff88; margin-bottom:5px;">ID: ${r.id.toString().slice(-6)}</div>
      <div>${r.descripcion || 'Sin datos adicionales'}</div>
      <div style="font-size:10px; margin-top:5px; opacity:0.7;">REGISTRO: ${fecha}</div>
    `;

    L.marker([r.lat, r.lng], { icon: ufoIcon })
      .bindPopup(popupContent)
      .addTo(markerLayer);
  });

  // Ajuste dinámico de densidad
  const densEl = document.getElementById("densidad");
  if (total > 20) {
    densEl.innerText = "CRÍTICA 🚨";
    densEl.style.color = "#ff4444";
  } else if (total > 5) {
    densEl.innerText = "ACTIVA 🛰️";
    densEl.style.color = "#ffff00";
  } else {
    densEl.innerText = "BAJA";
    densEl.style.color = "#00ff88";
  }
}

// Escuchar cambios en el selector para refrescar el contador
document.getElementById("range").addEventListener("change", () => {
  lastDataHash = ""; 
  loadData();
});

// Loops de monitoreo
loadData();
setInterval(loadData, 5000);
window.addEventListener('resize', () => map.invalidateSize());

// ===============================
// 🛰 REALTIME (SUPABASE)
// ===============================
const SUPABASE_URL = "https://jphasudsyxvxarpemfmj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwaGFzdWRzeXh2eGFycGVtZm1qIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjQ2MjIzOSwiZXhwIjoyMDg4MDM4MjM5fQ.19pUTaRB_Z9T-Ga-UjRxzonKX0ExRqn0VwhEOr49JKg";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

supabaseClient
  .channel('realtime-reportes')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reportes' }, (payload) => {
      triggerPush();
      loadData(); // Recarga inmediata para actualizar el contador
  })
  .subscribe();

</script>
</body>
</html>
