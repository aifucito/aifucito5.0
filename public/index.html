<script>
// ===============================
// 🛰 RADAR CORE STABLE (NO CAMBIA ESTILO)
// ===============================

const map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([-34.6, -58.4], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 18
}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);
let lastDataHash = "";

// ===============================
// 🚨 ICONO (SIN CAMBIOS VISUALES)
// ===============================
const ufoIcon = L.divIcon({
  className: 'ufo-icon-container',
  html: `
    <div class="ufo-pulse"></div>
    <svg class="ufo-svg" viewBox="0 0 100 100">
      <ellipse cx="50" cy="55" rx="45" ry="15" fill="none" stroke="#00ff88" stroke-width="2"/>
      <path d="M 25 50 C 25 25, 75 25, 75 50" fill="none" stroke="#00ff88" stroke-width="2"/>
      <circle cx="30" cy="62" r="2" fill="#00ff88"/>
      <circle cx="50" cy="65" r="2" fill="#00ff88"/>
      <circle cx="70" cy="62" r="2" fill="#00ff88"/>
    </svg>
  `,
  iconSize: [32, 32],
  iconAnchor: [16, 16]
});

// ===============================
// 🚀 ALERTA
// ===============================
function triggerPush() {
  const el = document.getElementById("push");
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 4000);
}

// ===============================
// 🌐 LOAD DATA OPTIMIZADO
// ===============================
async function loadData() {
  const range = document.getElementById("range").value;

  try {
    const res = await fetch(`/api/reportes?range=${range}`, {
      cache: "no-store"
    });

    if (!res.ok) return;

    const reportes = await res.json();

    // hash simple para detectar cambios reales
    const hash = JSON.stringify(reportes.map(r => r.id || `${r.lat}${r.lng}`));

    if (hash === lastDataHash) return;
    lastDataHash = hash;

    render(reportes);

  } catch (e) {
    console.error("Radar offline temporalmente");
  }
}

// ===============================
// 🎯 RENDER SIN FLICKER
// ===============================
function render(reportes) {
  markerLayer.clearLayers();

  reportes.forEach(r => {
    if (!r.lat || !r.lng) return;

    const fecha = new Date(r.created_at).toLocaleString('es-UY');

    const popupContent = `
      <div class="popup-header">AVISTAMIENTO</div>
      <div class="popup-loc">${r.ciudad || 'Zona desconocida'}</div>
      <div class="popup-desc">${r.descripcion || ''}</div>
      <div class="popup-footer">${fecha}</div>
    `;

    const marker = L.marker([r.lat, r.lng], { icon: ufoIcon })
      .bindPopup(popupContent);

    markerLayer.addLayer(marker);
  });

  // stats
  document.getElementById("count").innerText = reportes.length;

  let dens = "BAJA";
  if (reportes.length > 20) dens = "CRÍTICA 🚨";
  else if (reportes.length > 8) dens = "ACTIVA 🛰️";

  document.getElementById("densidad").innerText = dens;
}

// ===============================
// 🔄 LOOP ESTABLE
// ===============================
loadData();
setInterval(loadData, 5000); // más real-time sin romper rendimiento

window.addEventListener('resize', () => map.invalidateSize());
</script>

</body>
</html>
