<!DOCTYPE html>
<html>
<head>
    <title>RADAR AIFU 5.0</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; }
        .panel { 
            position: absolute; top: 15px; left: 15px; width: 220px;
            background: rgba(0, 20, 10, 0.9); border: 2px solid #00ff88;
            border-radius: 12px; padding: 15px; color: #00ff88; z-index: 9999;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); pointer-events: none;
        }
        .intensidad-bar { height: 8px; background: linear-gradient(to right, #0044ff, #00ff88, #ff0000); border-radius: 4px; margin: 10px 0; }
        /* Animación para que el radar parezca vivo */
        .radar-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { stroke-width: 1; stroke-opacity: 1; }
            100% { stroke-width: 20; stroke-opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="panel">
        <h2 style="margin:0; font-size:14px; border-bottom:1px solid #00ff88;">🛰️ RADAR TÁCTICO AIFU</h2>
        <div style="margin:10px 0; font-size:18px; font-weight:bold;">REPORTES: <span id="count">0</span></div>
        <div id="status" style="font-size:10px; transition: color 0.3s;">ESCANEANDO CIELO...</div>
        <div class="intensidad-bar"></div>
    </div>
    <div id="map"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // Iniciamos el mapa centrado en Uruguay
        var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-34.7, -56.1], 8);
        
        // Capa oscura para que resalten las luces del radar
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        var markers = L.layerGroup().addTo(map);

        function actualizar() {
            const statusLabel = document.getElementById('status');
            
            fetch('/radar-data')
            .then(res => {
                if (!res.ok) throw new Error("Error de red");
                return res.json();
            })
            .then(data => {
                markers.clearLayers();
                document.getElementById('count').innerText = data.length;
                statusLabel.innerText = "VIGILANCIA ACTIVA - CONO SUR";
                statusLabel.style.color = "#00ff88";

                data.forEach(p => {
                    // Círculo táctico para cada avistamiento
                    L.circleMarker([p.lat, p.lon], { 
                        radius: 8, 
                        color: '#00ff88', 
                        fillColor: '#00ff88', 
                        fillOpacity: 0.6,
                        className: 'radar-pulse'
                    })
                    .bindPopup(`
                        <div style="color:#000; font-family:monospace;">
                            <b>🛰️ INVESTIGADOR:</b> ${p.agente}<br>
                            <b>📝 DETALLE:</b> ${p.desc}
                        </div>
                    `)
                    .addTo(markers);
                });
            })
            .catch(e => {
                console.error("Error al conectar:", e);
                statusLabel.innerText = "⚠️ SEÑAL INTERRUMPIDA - RECONECTANDO";
                statusLabel.style.color = "#ff4444";
            });
        }

        // Ejecutar al cargar y cada 20 segundos
        actualizar(); 
        setInterval(actualizar, 20000);
    </script>
</body>
</html>
